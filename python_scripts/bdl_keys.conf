# HP CLJ Pro 4301-4303 BDL — AES-256 key-derivation constants
#
# These values are fed into the TrustZone Security_ComputeDeviceHash function
# (@ 0x9ff1b5e6) to derive per-file AES-256 keys.
#
# Key derivation:
#   AES_key = SHA-256(platform_prefix || platform_uuid || bytes.fromhex(digest_hex))
#
# Used when key_id=2468 (0x9A4), sub_key_id=1357 (0x54D).

[key_derivation]

# 28-byte prefix from dune_selene_kexec_trusted_fw.bin @ 0x9ff31210
platform_prefix =

# 36-byte UUID from dune_selene_kexec_trusted_fw.bin @ 0x9ff2eca0
platform_uuid =
